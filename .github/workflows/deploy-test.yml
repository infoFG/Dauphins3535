name: Deploy preview to /test

on:
  push:
    branches: [preview]

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout preview
        uses: actions/checkout@v4
        with:
          ref: preview

      - name: Deploy to gh-pages /test
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          destination_dir: test
          keep_files: true
          commit_message: "Deploy BjornTest to /test [skip ci]"
