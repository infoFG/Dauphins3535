name: Deploy preview to /test

on:
  push:
    branches: [preview]

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout preview
        uses: actions/checkout@v4
        with:
          ref: preview

      - name: Inject password gate
        run: |
          python3 -c "
with open('index.html', 'r') as f: html = f.read()
with open('pw-gate-snippet.html', 'r') as f: gate = f.read()
html = html.replace('</head>', gate + '\n</head>')
with open('index.html', 'w') as f: f.write(html)
"

      - name: Deploy to gh-pages /test
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          destination_dir: test
          keep_files: true
          commit_message: "Deploy BjornTest to /test [skip ci]"
