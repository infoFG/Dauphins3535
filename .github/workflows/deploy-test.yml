name: Deploy preview to /test

on:
  push:
    branches: [preview]
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout preview
        uses: actions/checkout@v4
        with:
          ref: preview

      - name: Inject password gate
        shell: bash
        run: |
          if [ -f pw-gate-snippet.html ]; then
            node -e "
              const fs = require('fs');
              const html = fs.readFileSync('index.html', 'utf8');
              const gate = fs.readFileSync('pw-gate-snippet.html', 'utf8');
              fs.writeFileSync('index.html', html.replace('</head>', gate + '\n</head>'));
            "
          fi

      - name: Deploy to gh-pages /test
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          destination_dir: test
          keep_files: true
          commit_message: "Deploy BjornTest to /test"
