<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les Dauphins sur-le-parc</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="home-page">

  <button class="menu-toggle" id="menuToggle" aria-label="Menu">☰</button>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ========== SIDEBAR ========== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="assets/logo-dauphins.jpg" alt="Dauphins3535">
      <h1>Les Dauphins sur-le-parc</h1>
    </div>
    <nav class="sidebar-nav">
      <ul>
        <li><a href="apropos.html"><span class="nav-icon">🏠</span> À propos</a></li>
        <li><a href="reglements.html"><span class="nav-icon">📋</span> Règlements</a></li>
        <li><a href="installations.html"><span class="nav-icon">🏊</span> Installations</a></li>
        <li><a href="galerie-commerciale.html"><span class="nav-icon">🛍️</span> Galerie Commerciale</a></li>
        <li><a href="unites.html"><span class="nav-icon">🔑</span> Unités à vendre</a></li>
        <li><a href="condoweb.html"><span class="nav-icon">⚙️</span> CondoWeb</a></li>
      </ul>
    </nav>
  </aside>

  <!-- ========== HERO ========== -->
  <main class="main-content">
    <section class="hero-section">
      <div class="hero-content">
        <img src="assets/hero-batiment.jpg" alt="Les Dauphins sur-le-parc" class="hero-image">
        <h1 class="hero-title">Les Dauphins sur-le-parc</h1>
        <p class="hero-subtitle">Immeuble à condos et galerie commerciale</p>
        <p class="hero-tagline">Confort et communauté au cœur de votre quotidien</p>
        <a href="apropos.html" class="hero-cta">Découvrir</a>
      </div>
    </section>
  </main>

  <script>
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const toggle = document.getElementById('menuToggle');

    function closeMenu() {
      sidebar.classList.remove('open');
      overlay.classList.remove('open');
      toggle.textContent = '☰';
    }

    function openMenu() {
      sidebar.classList.add('open');
      overlay.classList.add('open');
      toggle.textContent = '✕';
    }

    toggle.addEventListener('click', () => {
      if (sidebar.classList.contains('open')) closeMenu();
      else openMenu();
    });

    overlay.addEventListener('click', closeMenu);

    document.querySelectorAll('.sidebar-nav a').forEach(a => {
      a.addEventListener('click', () => {
        if (window.innerWidth <= 768) closeMenu();
      });
    });
  </script>
</body>
</html>
